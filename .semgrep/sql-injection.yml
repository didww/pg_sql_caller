rules:
  - id: pg-sql-caller-interpolated-raw-sql
    languages: [ruby]
    severity: WARNING
    message: >-
      Interpolated string passed to a raw-SQL execution method. Interpolating
      values (or identifiers) directly into a SQL string risks SQL injection if
      any interpolated part is caller-controlled. Prefer bound `?` placeholders
      with `*bindings` (sanitized through `sanitize_sql_array`), or for dynamic
      identifiers use `connection.quote_column_name` / `quoted_table_name`.
    metadata:
      category: security
      cwe: "CWE-89: Improper Neutralization of Special Elements used in an SQL Command ('SQL Injection')"
      owasp: "A03:2021 - Injection"
      confidence: MEDIUM
      references:
        - https://guides.rubyonrails.org/security.html#sql-injection
    patterns:
      - pattern-either:
          - pattern: $FN("...#{$X}...", ...)
          - pattern: $RECV.$FN("...#{$X}...", ...)
      - metavariable-regex:
          metavariable: $FN
          regex: ^(execute|select_value|select_values|select_all|select_rows|select_row|select_all_serialized|select_value_serialized|select_values_serialized|explain_analyze)$
